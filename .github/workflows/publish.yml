name: Publish to PyPI

# Publishes the package to PyPI on every GitHub Release, and can be run by hand
# (workflow_dispatch). Authenticates with a PyPI API token stored as the GitHub
# Actions secret PYPI_API_TOKEN (scoped to the "pypi" environment). One-time
# setup is documented in docs/wiki/Development-and-contributing.md.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Publish runs in the "pypi" environment: store the PyPI API token there as a
    # secret named PYPI_API_TOKEN, and optionally add a required reviewer so a
    # push alone can't publish. GitHub auto-creates the environment on first run.
    environment:
      name: pypi
      url: https://pypi.org/p/cobos-apple-mail-mcp
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
