name: Publish to PyPI

# Publishes the package to PyPI on every GitHub Release, and can be run by hand
# (workflow_dispatch). Uses PyPI Trusted Publishing (OIDC) — there is NO API
# token stored anywhere; PyPI verifies the GitHub Actions identity directly.
# The trusted publisher (project cobos-apple-mail-mcp, workflow publish.yml,
# environment pypi) was established by the first release. One-time setup is in
# docs/wiki/Development-and-contributing.md.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the environment named in PyPI's trusted-publisher config; also
    # where an optional required-reviewer rule would live. GitHub auto-creates it.
    environment:
      name: pypi
      url: https://pypi.org/p/cobos-apple-mail-mcp
    permissions:
      id-token: write # required for Trusted Publishing (OIDC); no token needed
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
