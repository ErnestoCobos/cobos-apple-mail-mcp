name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runners: the test boundary includes real osascript subprocess calls
    # (tests/test_jxa_executor.py, never touching Application("Mail")), which
    # need a real macOS environment. The sqlite-vec tests
    # (tests/test_vector_search.py) run only where the interpreter's sqlite3
    # supports loadable extensions; GitHub's prebuilt macOS setup-python omits
    # enable_load_extension, so they skip here and are exercised on a real dev
    # machine instead. See docs/wiki/Development-and-contributing.md.
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev,full]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -v

      - name: Docs sync check
        run: python scripts/check_docs_sync.py --base origin/main
