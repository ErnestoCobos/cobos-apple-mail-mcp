name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runners: the test boundary deliberately includes real osascript
    # subprocess calls (tests/test_jxa_executor.py, never touching
    # Application("Mail")) and a real sqlite-vec extension load
    # (tests/test_vector_search.py) -- these need a real macOS environment
    # to run for real rather than always skip. See
    # docs/wiki/Development-and-contributing.md.
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev,full]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -v

      - name: Docs sync check
        run: python scripts/check_docs_sync.py --base origin/main
