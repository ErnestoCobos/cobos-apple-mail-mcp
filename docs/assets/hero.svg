<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="cobos-apple-mail-mcp — a unified Apple Mail MCP server">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1E"/>
      <stop offset="0.55" stop-color="#101A33"/>
      <stop offset="1" stop-color="#182541"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B9BFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5B9BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B9BFF"/>
      <stop offset="1" stop-color="#9B7CFF"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B9BFF"/>
      <stop offset="1" stop-color="#8A78FF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="420" rx="26" fill="url(#bg)"/>
  <circle cx="1030" cy="70" r="340" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="418" rx="26" fill="none" stroke="#33406A" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- kicker -->
  <text x="72" y="92" fill="#7FA6E8" font-size="15" font-weight="600" letter-spacing="3">APPLE&#160;MAIL&#160;&#183;&#160;MODEL&#160;CONTEXT&#160;PROTOCOL&#160;SERVER</text>

  <!-- title -->
  <text x="70" y="168" fill="#F5F8FF" font-size="58" font-weight="700" letter-spacing="-1">cobos-apple-mail-mcp</text>
  <rect x="74" y="188" width="240" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="72" y="242" fill="#C4CFE8" font-size="25" font-weight="500">Fast on-disk reads &amp; search. Full AppleScript writes.</text>
  <text x="72" y="278" fill="#8E9BBD" font-size="22" font-weight="400">One safety layer bridged by a canonical Message-ID.</text>

  <!-- feature pills -->
  <g>
    <rect x="72" y="312" width="214" height="46" rx="23" fill="#5B9BFF" fill-opacity="0.12" stroke="#5B9BFF" stroke-opacity="0.5"/>
    <circle cx="98" cy="335" r="6" fill="#5BA8FF"/>
    <text x="114" y="341" fill="#CFE0FF" font-size="17" font-weight="500">ms-fast FTS5 search</text>

    <rect x="298" y="312" width="212" height="46" rx="23" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.5"/>
    <circle cx="324" cy="335" r="6" fill="#34D399"/>
    <text x="340" y="341" fill="#B9F0DA" font-size="17" font-weight="500">safety-gated writes</text>

    <rect x="522" y="312" width="150" height="46" rx="23" fill="#F5B94A" fill-opacity="0.12" stroke="#F5B94A" stroke-opacity="0.5"/>
    <circle cx="548" cy="335" r="6" fill="#F5B94A"/>
    <text x="564" y="341" fill="#F7DEA8" font-size="17" font-weight="500">honest undo</text>
  </g>

  <!-- stat strip -->
  <text x="72" y="392" fill="#6C7899" font-size="16" font-weight="400">31 MCP tools&#160;&#160;&#183;&#160;&#160;keyword + semantic search&#160;&#160;&#183;&#160;&#160;JWZ threading + triage&#160;&#160;&#183;&#160;&#160;never hangs&#160;&#160;&#183;&#160;&#160;GPL-3.0</text>

  <!-- right visual: envelope with fast + safe badges -->
  <g>
    <rect x="905" y="132" width="300" height="188" rx="18" fill="#0E1730" stroke="#3A4A78" stroke-opacity="0.7" stroke-width="1.5"/>
    <!-- envelope body -->
    <rect x="948" y="164" width="214" height="132" rx="12" fill="#5B9BFF" fill-opacity="0.06" stroke="url(#env)" stroke-width="3"/>
    <!-- flap -->
    <path d="M951 172 L1055 250 L1159 172" fill="none" stroke="url(#env)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- speed badge (lightning) -->
    <circle cx="1170" cy="150" r="26" fill="#F5B94A"/>
    <path d="M1173 136 L1160 154 L1170 154 L1166 166 L1181 147 L1171 147 Z" fill="#3A2A06"/>
    <!-- safety badge (shield + check) -->
    <circle cx="940" cy="300" r="26" fill="#34D399"/>
    <path d="M940 286 L953 291 L953 300 C953 309 947 314 940 316 C933 314 927 309 927 300 L927 291 Z" fill="#0B3B2C"/>
    <path d="M934 300 L939 305 L947 295" fill="none" stroke="#EAFBF3" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
